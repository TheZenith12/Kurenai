<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Энэ үнэ цэнэтэй юу?</title>

<!-- PWA meta -->
<meta name="theme-color" content="#0f0f0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Worth It?">
<meta name="description" content="Худалдан авалт чинь хэдэн цагийн хөдөлмөр вэ? Импульс худалдан авалтаас сэргийл.">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230f0f0f'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle' fill='%23f0c040'%3E%E2%8C%9B%3C/text%3E%3C/svg%3E">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230f0f0f'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle' fill='%23f0c040'%3E%E2%8C%9B%3C/text%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#0f0f0f;
    --card:#1a1a1a;
    --card-2:#222;
    --accent:#f0c040;
    --accent-dim:rgba(240,192,64,.15);
    --text:#f5f5f5;
    --muted:#888;
    --muted-2:#5a5a5a;
    --danger:#e0524b;
    --border:#2a2a2a;
    --radius:18px;
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

  html,body{height:100%;}

  body{
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.4;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  .app{
    max-width:480px;
    margin:0 auto;
    min-height:100vh;
    min-height:100dvh;
    position:relative;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }

  /* ---------- generic ---------- */
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input{font-family:inherit;}

  .screen{
    position:absolute;
    inset:0;
    padding:28px 22px 40px;
    display:flex;
    flex-direction:column;
    opacity:0;
    visibility:hidden;
    transform:translateX(0);
    transition:opacity .35s ease, transform .35s ease, visibility .35s;
  }
  .screen.active{opacity:1;visibility:visible;}

  /* ---------- setup ---------- */
  #setupScreen{justify-content:center;}

  .progress{
    display:flex;gap:6px;justify-content:center;margin-bottom:34px;
  }
  .progress span{
    width:32px;height:4px;border-radius:4px;background:var(--border);transition:background .3s;
  }
  .progress span.on{background:var(--accent);}

  .step{
    display:none;
    animation:slideIn .45s cubic-bezier(.2,.7,.3,1);
  }
  .step.show{display:block;}

  @keyframes slideIn{
    from{opacity:0;transform:translateX(36px);}
    to{opacity:1;transform:translateX(0);}
  }

  .step .q{
    font-size:1.5rem;font-weight:700;margin-bottom:6px;line-height:1.25;
  }
  .step .hint{color:var(--muted);font-size:.92rem;margin-bottom:26px;}

  .field-row{display:flex;align-items:stretch;gap:10px;}

  .cur-select{
    background:var(--card-2);border:1px solid var(--border);border-radius:14px;
    color:var(--text);font-size:1.3rem;font-weight:700;padding:0 16px;min-width:64px;
    text-align:center;
  }

  .big-input{
    flex:1;width:100%;background:var(--card);border:1px solid var(--border);
    border-radius:14px;color:var(--text);font-size:1.6rem;font-weight:700;
    padding:16px 18px;outline:none;transition:border-color .2s;
  }
  .big-input:focus{border-color:var(--accent);}
  .big-input::placeholder{color:var(--muted-2);font-weight:600;}

  .btn-group{display:flex;gap:10px;}
  .btn-group button{
    flex:1;background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:18px 0;font-size:1.05rem;font-weight:600;color:var(--muted);
    transition:all .2s;
  }
  .btn-group button.sel{
    background:var(--accent-dim);border-color:var(--accent);color:var(--accent);
  }

  .slider-wrap{margin-top:6px;}
  .slider-val{
    text-align:center;font-size:2.6rem;font-weight:800;color:var(--accent);margin-bottom:4px;
  }
  .slider-val small{font-size:1rem;color:var(--muted);font-weight:600;margin-left:4px;}
  input[type=range]{
    -webkit-appearance:none;appearance:none;width:100%;height:6px;border-radius:6px;
    background:var(--border);outline:none;margin:18px 0;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:28px;height:28px;border-radius:50%;
    background:var(--accent);cursor:pointer;box-shadow:0 0 0 6px var(--accent-dim);
  }
  input[type=range]::-moz-range-thumb{
    width:28px;height:28px;border:none;border-radius:50%;background:var(--accent);
    cursor:pointer;box-shadow:0 0 0 6px var(--accent-dim);
  }
  .range-labels{display:flex;justify-content:space-between;color:var(--muted-2);font-size:.8rem;}

  .primary-btn{
    width:100%;background:var(--accent);color:#1a1400;font-size:1.1rem;font-weight:700;
    padding:17px 0;border-radius:14px;margin-top:30px;transition:transform .12s, opacity .2s;
  }
  .primary-btn:active{transform:scale(.97);}

  .ghost-btn{
    width:100%;background:var(--card);border:1px solid var(--border);color:var(--muted);
    font-size:1rem;font-weight:600;padding:15px 0;border-radius:14px;margin-top:12px;
    transition:transform .12s;
  }
  .ghost-btn:active{transform:scale(.97);}

  /* summary card */
  .summary{
    text-align:center;animation:slideIn .45s cubic-bezier(.2,.7,.3,1);
  }
  .summary .lbl{color:var(--muted);font-size:.95rem;margin-bottom:10px;}
  .summary .rate{
    font-size:2.7rem;font-weight:800;color:var(--accent);line-height:1.1;
  }
  .summary .rate small{font-size:1.1rem;color:var(--muted);font-weight:600;}
  .summary .meta{color:var(--muted-2);font-size:.85rem;margin-top:14px;}

  /* ---------- main ---------- */
  #mainScreen{padding-top:18px;}

  .topbar{display:flex;align-items:center;justify-content:center;margin-bottom:30px;position:relative;}
  .rate-pill{
    background:var(--card);border:1px solid var(--border);border-radius:999px;
    padding:9px 16px;font-size:.92rem;font-weight:700;color:var(--accent);
    display:inline-flex;align-items:center;gap:7px;transition:transform .12s,border-color .2s;
  }
  .rate-pill:active{transform:scale(.95);}
  .rate-pill .gear{font-size:.85rem;opacity:.7;}

  .calc-center{text-align:center;margin-bottom:8px;}
  .calc-center .ql{color:var(--muted);font-size:1rem;font-weight:600;margin-bottom:14px;}

  .price-input-wrap{
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .price-cur{font-size:2.4rem;font-weight:800;color:var(--muted);}
  #priceInput{
    background:none;border:none;outline:none;color:var(--text);
    font-size:3.2rem;font-weight:800;text-align:center;width:100%;max-width:300px;
    caret-color:var(--accent);
  }
  #priceInput::placeholder{color:var(--muted-2);}

  .shake{animation:shake .4s;}
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-9px);}
    40%{transform:translateX(9px);}
    60%{transform:translateX(-6px);}
    80%{transform:translateX(6px);}
  }

  /* result card */
  .result{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:26px 22px;margin-top:26px;text-align:center;
    opacity:0;transform:translateY(24px);
    transition:opacity .4s ease, transform .4s cubic-bezier(.2,.7,.3,1), border-color .3s;
    pointer-events:none;
  }
  .result.show{opacity:1;transform:translateY(0);pointer-events:auto;}

  .result .hours{
    font-size:3.2rem;font-weight:800;color:var(--accent);line-height:1;
  }
  .result .hours small{font-size:1.4rem;}
  .result .sub1{font-size:1.05rem;font-weight:600;margin-top:12px;color:var(--text);}
  .result .sub2{font-size:.9rem;color:var(--muted);margin-top:4px;}
  .result .verdict{
    margin-top:18px;font-size:1.05rem;font-weight:700;padding:10px 14px;border-radius:12px;
    background:var(--card-2);display:inline-block;
  }

  .result.warn{border-color:rgba(224,82,75,.5);animation:pulseRed 1.6s infinite;}
  @keyframes pulseRed{
    0%,100%{border-color:rgba(224,82,75,.25);box-shadow:0 0 0 0 rgba(224,82,75,0);}
    50%{border-color:rgba(224,82,75,.9);box-shadow:0 0 22px -6px rgba(224,82,75,.5);}
  }

  .result-actions{display:flex;gap:10px;margin-top:20px;}
  .result-actions button{
    flex:1;padding:14px 0;border-radius:12px;font-weight:700;font-size:.98rem;transition:transform .12s;
  }
  .result-actions button:active{transform:scale(.96);}
  .save-btn{background:var(--accent);color:#1a1400;}
  .clear-btn{background:var(--card-2);color:var(--muted);border:1px solid var(--border);}

  /* history */
  .history{margin-top:34px;flex:1;}
  .history h2{font-size:1.05rem;font-weight:700;margin-bottom:14px;color:var(--text);}
  .hist-empty{color:var(--muted-2);font-size:.9rem;text-align:center;padding:24px 0;}

  .hist-item{
    background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:13px 15px;margin-bottom:10px;display:flex;align-items:center;gap:12px;
    animation:slideIn .35s ease;
  }
  .hist-item .info{flex:1;min-width:0;}
  .hist-item .name{font-weight:600;font-size:.98rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .hist-item .line{font-size:.86rem;color:var(--muted);margin-top:2px;}
  .hist-item .line b{color:var(--accent);font-weight:700;}
  .hist-item .date{font-size:.72rem;color:var(--muted-2);margin-top:3px;}
  .hist-del{
    width:30px;height:30px;border-radius:50%;background:var(--card-2);color:var(--muted);
    font-size:1.1rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    transition:background .2s,color .2s;
  }
  .hist-del:active{background:var(--danger);color:#fff;}

  /* ---------- settings panel ---------- */
  #settingsScreen{
    transform:translateX(100%);
    background:var(--bg);
    overflow-y:auto;
  }
  #settingsScreen.active{transform:translateX(0);}

  .settings-head{display:flex;align-items:center;gap:14px;margin-bottom:28px;}
  .back-btn{
    width:40px;height:40px;border-radius:12px;background:var(--card);border:1px solid var(--border);
    font-size:1.3rem;display:flex;align-items:center;justify-content:center;color:var(--text);
  }
  .settings-head h2{font-size:1.3rem;font-weight:700;}

  .set-field{margin-bottom:24px;}
  .set-field label{display:block;color:var(--muted);font-size:.92rem;font-weight:600;margin-bottom:10px;}

  /* toast */
  .toast{
    position:fixed;left:50%;bottom:34px;transform:transl(-50%,40px);
    transform:translateX(-50%) translateY(40px);
    background:var(--accent);color:#1a1400;padding:12px 22px;border-radius:999px;
    font-weight:700;font-size:.95rem;opacity:0;transition:all .3s;z-index:50;pointer-events:none;
    white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* name prompt modal */
  .modal-bg{
    position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px);
    display:flex;align-items:flex-end;justify-content:center;z-index:40;
    opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s;
  }
  .modal-bg.show{opacity:1;visibility:visible;}
  .modal{
    background:var(--card);border:1px solid var(--border);border-radius:20px 20px 0 0;
    width:100%;max-width:480px;padding:24px 22px 30px;
    transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.7,.3,1);
  }
  .modal-bg.show .modal{transform:translateY(0);}
  .modal h3{font-size:1.2rem;font-weight:700;margin-bottom:16px;}
  .modal input{
    width:100%;background:var(--card-2);border:1px solid var(--border);border-radius:12px;
    color:var(--text);font-size:1.1rem;padding:14px 16px;outline:none;
  }
  .modal input:focus{border-color:var(--accent);}
  .modal-actions{display:flex;gap:10px;margin-top:18px;}
</style>
</head>
<body>
<div class="app">

  <!-- ============ SETUP ============ -->
  <section id="setupScreen" class="screen">
    <div class="progress">
      <span class="on" data-p="0"></span>
      <span data-p="1"></span>
      <span data-p="2"></span>
    </div>

    <!-- step 1: salary -->
    <div class="step show" data-step="0">
      <div class="q">Сарын цалин чинь хэд вэ?</div>
      <div class="hint">Татварын дараах орлогоо оруулаарай</div>
      <div class="field-row">
        <select id="curSelect" class="cur-select">
          <option value="MNT">₮</option>
          <option value="USD">$</option>
        </select>
        <input id="salaryInput" class="big-input" inputmode="numeric" placeholder="1,500,000" autocomplete="off">
      </div>
      <button class="primary-btn" onclick="setupNext(0)">Цааш →</button>
    </div>

    <!-- step 2: days/week -->
    <div class="step" data-step="1">
      <div class="q">7 хоногт хэдэн өдөр ажилладаг вэ?</div>
      <div class="hint">Дунджаар хэдэн өдөр</div>
      <div class="btn-group" id="daysGroup">
        <button data-days="5">5 өдөр</button>
        <button data-days="6">6 өдөр</button>
        <button data-days="7">7 өдөр</button>
      </div>
      <button class="primary-btn" onclick="setupNext(1)">Цааш →</button>
      <button class="ghost-btn" onclick="setupBack(1)">← Буцах</button>
    </div>

    <!-- step 3: hours/day -->
    <div class="step" data-step="2">
      <div class="q">Өдөрт хэдэн цаг ажилладаг вэ?</div>
      <div class="hint">Дунджаар</div>
      <div class="slider-wrap">
        <div class="slider-val"><span id="hoursVal">8</span><small>цаг</small></div>
        <input type="range" id="hoursSlider" min="4" max="12" step="1" value="8">
        <div class="range-labels"><span>4 цаг</span><span>12 цаг</span></div>
      </div>
      <button class="primary-btn" onclick="setupNext(2)">Дуусгах →</button>
      <button class="ghost-btn" onclick="setupBack(2)">← Буцах</button>
    </div>

    <!-- summary -->
    <div class="step" data-step="3">
      <div class="summary">
        <div class="lbl">Чиний цагийн үнэ</div>
        <div class="rate" id="summaryRate">₮0 <small>/ цаг</small></div>
        <div class="meta" id="summaryMeta"></div>
      </div>
      <button class="primary-btn" onclick="finishSetup()">Эхлэх →</button>
      <button class="ghost-btn" onclick="setupBack(3)">← Засах</button>
    </div>
  </section>

  <!-- ============ MAIN ============ -->
  <section id="mainScreen" class="screen">
    <div class="topbar">
      <button class="rate-pill" id="ratePill" onclick="openSettings()">
        <span id="ratePillText">₮0/цаг</span><span class="gear">⚙</span>
      </button>
    </div>

    <div class="calc-center">
      <div class="ql">Юуны үнэ?</div>
      <div class="price-input-wrap" id="priceWrap">
        <span class="price-cur" id="priceCur">₮</span>
        <input id="priceInput" inputmode="numeric" placeholder="0" autocomplete="off">
      </div>
    </div>

    <div class="result" id="result">
      <div class="hours" id="resHours">0 <small>цаг</small></div>
      <div class="sub1" id="resSub1"></div>
      <div class="sub2" id="resSub2"></div>
      <div class="verdict" id="resVerdict"></div>
      <div class="result-actions">
        <button class="save-btn" onclick="askSave()">Хадгалах</button>
        <button class="clear-btn" onclick="clearPrice()">Арилгах</button>
      </div>
    </div>

    <div class="history">
      <h2>Өмнөх тооцоонууд</h2>
      <div id="histList"></div>
    </div>
  </section>

  <!-- ============ SETTINGS ============ -->
  <section id="settingsScreen" class="screen">
    <div class="settings-head">
      <button class="back-btn" onclick="closeSettings()">←</button>
      <h2>Тохиргоо</h2>
    </div>

    <div class="set-field">
      <label>Сарын цалин</label>
      <div class="field-row">
        <select id="setCur" class="cur-select">
          <option value="MNT">₮</option>
          <option value="USD">$</option>
        </select>
        <input id="setSalary" class="big-input" inputmode="numeric" placeholder="1,500,000" autocomplete="off">
      </div>
    </div>

    <div class="set-field">
      <label>7 хоногт хэдэн өдөр</label>
      <div class="btn-group" id="setDaysGroup">
        <button data-days="5">5 өдөр</button>
        <button data-days="6">6 өдөр</button>
        <button data-days="7">7 өдөр</button>
      </div>
    </div>

    <div class="set-field">
      <label>Өдөрт хэдэн цаг</label>
      <div class="slider-wrap">
        <div class="slider-val"><span id="setHoursVal">8</span><small>цаг</small></div>
        <input type="range" id="setHoursSlider" min="4" max="12" step="1" value="8">
        <div class="range-labels"><span>4 цаг</span><span>12 цаг</span></div>
      </div>
    </div>

    <button class="primary-btn" onclick="saveSettings()">Хадгалах</button>
  </section>

  <!-- name modal -->
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3>Энэ юу вэ?</h3>
      <input id="itemName" placeholder="Жишээ: Шинэ гутал" autocomplete="off">
      <div class="modal-actions">
        <button class="save-btn" style="flex:1;padding:14px 0;border-radius:12px;font-weight:700;" onclick="confirmSave()">Хадгалах</button>
        <button class="clear-btn" style="flex:1;padding:14px 0;border-radius:12px;font-weight:700;border:1px solid var(--border);" onclick="confirmSave(true)">Нэргүй</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
"use strict";

const LS_SETTINGS = "wi_settings";
const LS_HISTORY  = "wi_history";

// ---- state ----
let settings = { salary:0, currency:"MNT", days:5, hours:8 };
let setupTmp = { salary:0, currency:"MNT", days:null, hours:8 };
let history  = [];
let lastCalc = null; // {price, hours}

// ---- helpers ----
const $ = id => document.getElementById(id);

function sym(cur){ return cur === "USD" ? "$" : "₮"; }

function fmtNum(n){
  return Math.round(n).toLocaleString("en-US");
}

// hourly rate = monthly salary / (days/week * 4.345 weeks * hours/day)
function hourlyRate(s){
  const monthlyHours = s.days * 4.345 * s.hours;
  if(monthlyHours <= 0) return 0;
  return s.salary / monthlyHours;
}

function parseNum(str){
  const n = parseFloat(String(str).replace(/[^0-9.]/g,""));
  return isNaN(n) ? 0 : n;
}

// format an input field with thousands separators while typing
function attachThousands(input){
  input.addEventListener("input", () => {
    const caretEnd = input.selectionStart === input.value.length;
    const raw = input.value.replace(/[^0-9]/g,"");
    input.value = raw ? parseInt(raw,10).toLocaleString("en-US") : "";
    if(caretEnd){ input.selectionStart = input.selectionEnd = input.value.length; }
  });
}

// ---- screen routing ----
function show(id){
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  $(id).classList.add("active");
}

/* ================= SETUP ================= */
let curStep = 0;

function showStep(n){
  document.querySelectorAll("#setupScreen .step").forEach(s=>s.classList.remove("show"));
  document.querySelector(`#setupScreen .step[data-step="${n}"]`).classList.add("show");
  document.querySelectorAll(".progress span").forEach(sp=>{
    sp.classList.toggle("on", Number(sp.dataset.p) <= Math.min(n,2));
  });
  curStep = n;
}

function setupNext(from){
  if(from === 0){
    const sal = parseNum($("salaryInput").value);
    if(sal <= 0){ shakeEl($("salaryInput")); return; }
    setupTmp.salary = sal;
    setupTmp.currency = $("curSelect").value;
    showStep(1);
  } else if(from === 1){
    if(!setupTmp.days){ shakeEl($("daysGroup")); return; }
    showStep(2);
  } else if(from === 2){
    setupTmp.hours = Number($("hoursSlider").value);
    renderSummary();
    showStep(3);
  }
}
function setupBack(from){ showStep(from-1); }

function renderSummary(){
  const r = hourlyRate(setupTmp);
  $("summaryRate").innerHTML = `${sym(setupTmp.currency)}${fmtNum(r)} <small>/ цаг</small>`;
  $("summaryMeta").textContent =
    `${fmtNum(setupTmp.salary)}${sym(setupTmp.currency)} • ${setupTmp.days} өдөр/7хон • ${setupTmp.hours} цаг/өдөр`;
}

function finishSetup(){
  settings = { ...setupTmp };
  localStorage.setItem(LS_SETTINGS, JSON.stringify(settings));
  initMain();
  show("mainScreen");
  setTimeout(()=>$("priceInput").focus(), 400);
}

/* ================= MAIN ================= */
function initMain(){
  const r = hourlyRate(settings);
  $("ratePillText").textContent = `${sym(settings.currency)}${fmtNum(r)}/цаг`;
  $("priceCur").textContent = sym(settings.currency);
  renderHistory();
}

let countAnim = null;
function calcLive(){
  const price = parseNum($("priceInput").value);
  if(price <= 0){
    $("result").classList.remove("show","warn");
    lastCalc = null;
    return;
  }
  const rate = hourlyRate(settings);
  const hours = rate > 0 ? price / rate : 0;
  lastCalc = { price, hours };

  renderResult(hours);
}

function renderResult(hours){
  const res = $("result");
  // breakdown
  const workHoursDay = settings.hours;
  const totalMin = Math.round(hours * 60);
  const h = Math.floor(totalMin / 60);
  const m = totalMin % 60;

  // calendar-ish "1 өдөр X цаг Y минут" — a day here = 24h? No: real elapsed days feel wrong.
  // Use plain hours breakdown for sub1, work-days for sub2.
  let sub1;
  if(h >= 24){
    const d = Math.floor(h/24);
    const rh = h % 24;
    sub1 = `= ${d} өдөр ${rh} цаг ${m} мин`;
  } else {
    sub1 = `= ${h} цаг ${m} минут`;
  }

  const workDays = hours / workHoursDay;
  $("resSub1").textContent = sub1;
  $("resSub2").textContent = `Буюу ажлын ${workDays.toFixed(1)} өдөр`;

  // verdict
  let verdict, warn=false;
  if(hours < 1)       verdict = "✅ Хямд — авч болно";
  else if(hours < 4)  verdict = "🤔 Бодоод үз";
  else if(hours < 8)  verdict = "⚠️ Нэг өдрийн хөдөлмөр";
  else if(hours < 24){ verdict = "😬 Хэдэн өдрийн хөдөлмөр!"; warn=true; }
  else               { verdict = "🚨 Нэг долоо хоногоос дээш!"; warn=true; }

  $("resVerdict").textContent = verdict;
  res.classList.toggle("warn", warn);

  res.classList.add("show");
  animateHours(hours);
}

function animateHours(target){
  const el = $("resHours");
  const dur = 500;
  const start = performance.now();
  cancelAnimationFrame(countAnim);
  function tick(now){
    const p = Math.min((now - start)/dur, 1);
    const eased = 1 - Math.pow(1-p, 3);
    const val = target * eased;
    const disp = val >= 100 ? val.toFixed(0) : val.toFixed(1);
    el.innerHTML = `${disp} <small>цаг</small>`;
    if(p < 1) countAnim = requestAnimationFrame(tick);
  }
  countAnim = requestAnimationFrame(tick);
}

function clearPrice(){
  $("priceInput").value = "";
  $("result").classList.remove("show","warn");
  lastCalc = null;
  $("priceInput").focus();
}

/* ---- save to history ---- */
function askSave(){
  if(!lastCalc) return;
  $("itemName").value = "";
  $("modalBg").classList.add("show");
  setTimeout(()=>$("itemName").focus(), 250);
}

function confirmSave(skip){
  const name = skip ? "" : $("itemName").value.trim();
  history.unshift({
    name: name || "Нэргүй зүйл",
    price: lastCalc.price,
    hours: lastCalc.hours,
    cur: settings.currency,
    ts: Date.now()
  });
  history = history.slice(0, 50);
  localStorage.setItem(LS_HISTORY, JSON.stringify(history));
  $("modalBg").classList.remove("show");
  renderHistory();
  toast("Хадгаллаа ✓");
  clearPrice();
}

function deleteHist(ts){
  history = history.filter(h => h.ts !== ts);
  localStorage.setItem(LS_HISTORY, JSON.stringify(history));
  renderHistory();
}

function renderHistory(){
  const list = $("histList");
  if(history.length === 0){
    list.innerHTML = `<div class="hist-empty">Хараахан тооцоо алга.<br>Дээр үнэ оруулаад хадгалаарай.</div>`;
    return;
  }
  list.innerHTML = history.slice(0,20).map(h=>{
    const hrs = h.hours >= 100 ? h.hours.toFixed(0) : h.hours.toFixed(1);
    return `<div class="hist-item">
      <div class="info">
        <div class="name">${escapeHtml(h.name)}</div>
        <div class="line">${sym(h.cur)}${fmtNum(h.price)} → <b>${hrs} цаг</b></div>
        <div class="date">${fmtDate(h.ts)}</div>
      </div>
      <button class="hist-del" onclick="deleteHist(${h.ts})">×</button>
    </div>`;
  }).join("");
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function fmtDate(ts){
  const d = new Date(ts);
  const now = new Date();
  const pad = n => String(n).padStart(2,"0");
  const time = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
  if(d.toDateString() === now.toDateString()) return `Өнөөдөр ${time}`;
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${time}`;
}

/* ================= SETTINGS ================= */
function openSettings(){
  $("setSalary").value = fmtNum(settings.salary);
  $("setCur").value = settings.currency;
  selectDays("setDaysGroup", settings.days);
  $("setHoursSlider").value = settings.hours;
  $("setHoursVal").textContent = settings.hours;
  show("settingsScreen");
}
function closeSettings(){ show("mainScreen"); }

function saveSettings(){
  const sal = parseNum($("setSalary").value);
  if(sal <= 0){ shakeEl($("setSalary")); return; }
  settings.salary = sal;
  settings.currency = $("setCur").value;
  settings.days = Number(document.querySelector('#setDaysGroup .sel')?.dataset.days || settings.days);
  settings.hours = Number($("setHoursSlider").value);
  localStorage.setItem(LS_SETTINGS, JSON.stringify(settings));
  initMain();
  // re-run live calc with new rate
  calcLive();
  show("mainScreen");
  toast("Шинэчиллээ ✓");
}

/* ---- shared UI bits ---- */
function selectDays(groupId, val){
  document.querySelectorAll(`#${groupId} button`).forEach(b=>{
    b.classList.toggle("sel", Number(b.dataset.days) === Number(val));
  });
}

function shakeEl(el){
  el.classList.remove("shake");
  void el.offsetWidth;
  el.classList.add("shake");
}

let toastTimer;
function toast(msg){
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove("show"), 1800);
}

/* ================= WIRE UP ================= */
function bindEvents(){
  attachThousands($("salaryInput"));
  attachThousands($("setSalary"));
  attachThousands($("priceInput"));

  // price live calc
  $("priceInput").addEventListener("input", calcLive);

  // setup days group
  document.querySelectorAll("#daysGroup button").forEach(b=>{
    b.addEventListener("click", ()=>{
      selectDays("daysGroup", b.dataset.days);
      setupTmp.days = Number(b.dataset.days);
    });
  });
  // settings days group
  document.querySelectorAll("#setDaysGroup button").forEach(b=>{
    b.addEventListener("click", ()=> selectDays("setDaysGroup", b.dataset.days));
  });

  // sliders
  $("hoursSlider").addEventListener("input", e=>{
    $("hoursVal").textContent = e.target.value;
  });
  $("setHoursSlider").addEventListener("input", e=>{
    $("setHoursVal").textContent = e.target.value;
  });

  // enter key on salary -> next
  $("salaryInput").addEventListener("keydown", e=>{ if(e.key==="Enter") setupNext(0); });
  $("itemName").addEventListener("keydown", e=>{ if(e.key==="Enter") confirmSave(); });

  // close modal on backdrop tap
  $("modalBg").addEventListener("click", e=>{
    if(e.target === $("modalBg")) $("modalBg").classList.remove("show");
  });
}

/* ================= BOOT ================= */
function boot(){
  bindEvents();
  const saved = localStorage.getItem(LS_SETTINGS);
  const savedHist = localStorage.getItem(LS_HISTORY);
  if(savedHist){ try{ history = JSON.parse(savedHist) || []; }catch(e){ history=[]; } }

  if(saved){
    try{
      settings = JSON.parse(saved);
      initMain();
      show("mainScreen");
      setTimeout(()=>$("priceInput").focus(), 300);
      return;
    }catch(e){ /* fall through to setup */ }
  }
  // first time
  show("setupScreen");
  showStep(0);
  setTimeout(()=>$("salaryInput").focus(), 300);
}

document.addEventListener("DOMContentLoaded", boot);
</script>
